<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .prediction-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            border: none;
        }
        h1, h2 { color: #2c3e50; font-weight: 700; margin-bottom: 25px; }
        legend { font-size: 1.2rem; color: #555; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: #34495e; margin-top: 10px; }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #ced4da;
        }
        .btn-predict {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-predict:hover {
            background-color: #3498db;
            transform: translateY(-2px);
            color: white;
        }
        .result-box {
            background: #eafaf1;
            border: 2px solid #27ae60;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="prediction-card">
                <h1 class="text-center">Student Exam Performance Indicator</h1>
                
                <form action="{{ url_for('predict_datapoint')}}" method="post">
                    <legend class="text-center">Enter Student Details for Prediction</legend>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Gender</label>
                            <select class="form-select" name="gender" required>
                                <option selected disabled value="">Select your Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Race or Ethnicity</label>
                            <select class="form-select" name="ethnicity" required>
                                <option selected disabled value="">Select Ethnicity</option>
                                <option value="group A">Group A</option>
                                <option value="group B">Group B</option>
                                <option value="group C">Group C</option>
                                <option value="group D">Group D</option>
                                <option value="group E">Group E</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Parental Education</label>
                            <select class="form-select" name="parental_level_of_education" required>
                                <option selected disabled value="">Select Parent Education</option>
                                <option value="associate's degree">Associate's Degree</option>
                                <option value="bachelor's degree">Bachelor's Degree</option>
                                <option value="high school">High School</option>
                                <option value="master's degree">Master's Degree</option>
                                <option value="some college">Some College</option>
                                <option value="some high school">Some High School</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lunch Type</label>
                            <select class="form-select" name="lunch" required>
                                <option selected disabled value="">Select Lunch Type</option>
                                <option value="free/reduced">Free/Reduced</option>
                                <option value="standard">Standard</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Test Preparation Course</label>
                            <select class="form-select" name="test_preparation_course" required>
                                <option selected disabled value="">Select Course Status</option>
                                <option value="none">None</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Reading Score (0-100)</label>
                            <input class="form-control" type="number" name="reading_score" placeholder="Reading Score" min='0' max='100' required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Writing Score (0-100)</label>
                            <input class="form-control" type="number" name="writing_score" placeholder="Writing Score" min='0' max='100' required />
                        </div>
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-predict">Predict your Maths Score</button>
                    </div>
                </form>

                {% if results %}
                <div class="result-box text-center">
                    <h3 class="text-success m-0">The Predicted MATH Score is: <strong>{{results}}</strong></h3>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Success AI | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), 
                        url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .hero-content p {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 700px;
            margin: 0 auto 40px auto;
            color: #dcdde1;
        }
        .btn-predict {
            background-color: #00cec9;
            color: #2d3436;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.3);
        }
        .btn-predict:hover {
            background-color: #ffffff;
            color: #00cec9;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }
        .feature-badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container hero-content">
        <div class="feature-badge">AI-Powered Analytics</div>
        <h1>Unlock Your Academic Potential</h1>
        <p>Harness the power of Machine Learning to analyze exam performance and predict academic outcomes with high precision.</p>
        
        <a href="/predictdata" class="btn btn-predict">Explore Predictions</a>
    </div>
</div>

</body>
</html>
